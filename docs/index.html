        "dashboards/config.py": "\"\"\"\nDashboard design system \u2014 Linear-inspired dark-mode-first aesthetic.\n\nColor tokens, CSS, and reusable components following the Linear design language:\nnear-black canvas, semi-transparent white borders, indigo-violet accent,\nInter font family, luminance-based depth.\n\"\"\"\n\n# \u2500\u2500\u2500 Color Tokens (Linear Design System) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nCOLORS = {\n    # Backgrounds\n    \"bg_base\": \"#08090a\",\n    \"bg_panel\": \"#0f1011\",\n    \"bg_surface\": \"#191a1b\",\n    \"bg_elevated\": \"#28282c\",\n    # Text\n    \"text_primary\": \"#f7f8f8\",\n    \"text_secondary\": \"#d0d6e0\",\n    \"text_tertiary\": \"#8a8f98\",\n    \"text_quaternary\": \"#62666d\",\n    # Brand\n    \"brand\": \"#5e6ad2\",\n    \"accent\": \"#7170ff\",\n    \"accent_hover\": \"#828fff\",\n    # Status\n    \"green\": \"#10b981\",\n    \"red\": \"#ef4444\",\n    \"amber\": \"#f59e0b\",\n    \"blue\": \"#3b82f6\",\n    # Borders\n    \"border_subtle\": \"rgba(255,255,255,0.05)\",\n    \"border_standard\": \"rgba(255,255,255,0.08)\",\n    \"border_solid\": \"#23252a\",\n    # Channel colors (muted to fit dark theme)\n    \"channels\": {\n        \"Paid Search\": \"#7170ff\",\n        \"Social\": \"#c084fc\",\n        \"Display\": \"#f59e0b\",\n        \"Video\": \"#ef4444\",\n        \"Email\": \"#10b981\",\n        \"Native\": \"#828fff\",\n        \"Affiliate\": \"#38bdf8\",\n    },\n}\n\n# Chart color sequence for Plotly\nCHART_COLORS = [\"#7170ff\", \"#c084fc\", \"#f59e0b\", \"#ef4444\", \"#10b981\", \"#828fff\", \"#38bdf8\"]\n\n# \u2500\u2500\u2500 Plotly Dark Template \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nPLOTLY_LAYOUT = dict(\n    paper_bgcolor=\"rgba(0,0,0,0)\",\n    plot_bgcolor=\"rgba(0,0,0,0)\",\n    font=dict(family=\"Inter, system-ui, sans-serif\", color=\"#d0d6e0\", size=12),\n    xaxis=dict(\n        gridcolor=\"rgba(255,255,255,0.05)\",\n        zerolinecolor=\"rgba(255,255,255,0.05)\",\n        tickfont=dict(color=\"#8a8f98\"),\n    ),\n    yaxis=dict(\n        gridcolor=\"rgba(255,255,255,0.05)\",\n        zerolinecolor=\"rgba(255,255,255,0.05)\",\n        tickfont=dict(color=\"#8a8f98\"),\n    ),\n    legend=dict(\n        font=dict(color=\"#d0d6e0\", size=11),\n        bgcolor=\"rgba(0,0,0,0)\",\n    ),\n    margin=dict(l=20, r=20, t=30, b=20),\n    hoverlabel=dict(bgcolor=\"#191a1b\", font_color=\"#f7f8f8\", bordercolor=\"#23252a\"),\n)\n\n\n# \u2500\u2500\u2500 Custom CSS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nCUSTOM_CSS = \"\"\"\n<style>\n    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');\n\n    /* \u2500\u2500 Global \u2500\u2500 */\n    .stApp {\n        font-family: 'Inter', system-ui, -apple-system, sans-serif;\n        background-color: #08090a;\n        color: #f7f8f8;\n    }\n    .stApp > header { background-color: #08090a; }\n    .main .block-container { padding-top: 2rem; max-width: 1200px; }\n\n    /* \u2500\u2500 Sidebar (Panel Dark) \u2500\u2500 */\n    section[data-testid=\"stSidebar\"] {\n        background-color: #0f1011;\n        border-right: 1px solid rgba(255,255,255,0.05);\n    }\n    section[data-testid=\"stSidebar\"] * {\n        color: #d0d6e0 !important;\n    }\n    section[data-testid=\"stSidebar\"] h1,\n    section[data-testid=\"stSidebar\"] h2,\n    section[data-testid=\"stSidebar\"] h3 {\n        color: #f7f8f8 !important;\n    }\n    section[data-testid=\"stSidebar\"] .stRadio label {\n        color: #8a8f98 !important;\n        font-size: 14px;\n        font-weight: 500;\n    }\n    section[data-testid=\"stSidebar\"] .stRadio label[data-checked=\"true\"],\n    section[data-testid=\"stSidebar\"] .stRadio label:hover {\n        color: #f7f8f8 !important;\n    }\n\n    /* \u2500\u2500 Headings \u2500\u2500 */\n    h1, h2, h3, h4 { color: #f7f8f8 !important; }\n    h1 { font-weight: 500; letter-spacing: -0.04em; }\n    h2 { font-weight: 500; letter-spacing: -0.02em; }\n    h3 { font-weight: 500; letter-spacing: -0.01em; font-size: 18px; }\n\n    /* \u2500\u2500 Text \u2500\u2500 */\n    p, span, li, td, th, label, div { color: #d0d6e0; }\n\n    /* \u2500\u2500 Metric Cards \u2500\u2500 */\n    .linear-card {\n        background: rgba(255,255,255,0.02);\n        border: 1px solid rgba(255,255,255,0.08);\n        border-radius: 8px;\n        padding: 20px 24px;\n        transition: background 0.15s ease;\n    }\n    .linear-card:hover {\n        background: rgba(255,255,255,0.04);\n    }\n    .linear-card .label {\n        font-size: 12px;\n        color: #8a8f98;\n        font-weight: 500;\n        text-transform: uppercase;\n        letter-spacing: 0.04em;\n        margin-bottom: 6px;\n    }\n    .linear-card .value {\n        font-size: 28px;\n        font-weight: 500;\n        color: #f7f8f8;\n        letter-spacing: -0.02em;\n    }\n    .linear-card .delta {\n        font-size: 12px;\n        margin-top: 6px;\n        font-weight: 500;\n    }\n    .delta-positive { color: #10b981; }\n    .delta-negative { color: #ef4444; }\n\n    /* \u2500\u2500 Section Headers \u2500\u2500 */\n    .section-header {\n        font-size: 24px;\n        font-weight: 500;\n        color: #f7f8f8;\n        letter-spacing: -0.02em;\n        margin: 28px 0 20px 0;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.05);\n    }\n\n    /* \u2500\u2500 Insight Box \u2500\u2500 */\n    .insight-box {\n        background: rgba(94,106,210,0.08);\n        border-radius: 8px;\n        padding: 16px 20px;\n        border-left: 3px solid #5e6ad2;\n        margin: 16px 0;\n        font-size: 14px;\n        color: #d0d6e0;\n        line-height: 1.6;\n    }\n    .insight-box strong { color: #f7f8f8; }\n\n    /* \u2500\u2500 Pill Badges \u2500\u2500 */\n    .pill {\n        display: inline-block;\n        padding: 2px 10px;\n        border-radius: 9999px;\n        font-size: 12px;\n        font-weight: 500;\n        border: 1px solid #23252a;\n        color: #d0d6e0;\n        background: transparent;\n    }\n\n    /* \u2500\u2500 Tables \u2500\u2500 */\n    .stDataFrame { border-radius: 8px; overflow: hidden; }\n    .stDataFrame table { background: rgba(255,255,255,0.02); }\n    .stDataFrame th {\n        background: rgba(255,255,255,0.04) !important;\n        color: #8a8f98 !important;\n        font-weight: 500;\n        font-size: 12px;\n        text-transform: uppercase;\n        letter-spacing: 0.04em;\n    }\n    .stDataFrame td {\n        color: #d0d6e0 !important;\n        border-color: rgba(255,255,255,0.05) !important;\n    }\n\n    /* \u2500\u2500 Tabs \u2500\u2500 */\n    .stTabs [data-baseweb=\"tab-list\"] {\n        gap: 0;\n        border-bottom: 1px solid rgba(255,255,255,0.05);\n    }\n    .stTabs [data-baseweb=\"tab\"] {\n        color: #8a8f98;\n        font-weight: 500;\n        font-size: 14px;\n    }\n    .stTabs [aria-selected=\"true\"] {\n        color: #f7f8f8 !important;\n        border-bottom-color: #5e6ad2 !important;\n    }\n\n    /* \u2500\u2500 Selectbox / Radio \u2500\u2500 */\n    .stSelectbox > div > div,\n    .stRadio > div {\n        background: rgba(255,255,255,0.02);\n        border-color: rgba(255,255,255,0.08);\n        border-radius: 6px;\n    }\n\n    /* \u2500\u2500 Buttons \u2500\u2500 */\n    .stButton button {\n        background: rgba(255,255,255,0.04);\n        color: #d0d6e0;\n        border: 1px solid rgba(255,255,255,0.08);\n        border-radius: 6px;\n        font-weight: 500;\n        font-size: 13px;\n        transition: background 0.15s ease;\n    }\n    .stButton button:hover {\n        background: rgba(255,255,255,0.08);\n        color: #f7f8f8;\n        border-color: rgba(255,255,255,0.12);\n    }\n\n    /* \u2500\u2500 Dividers \u2500\u2500 */\n    hr { border-color: rgba(255,255,255,0.05) !important; }\n\n    /* \u2500\u2500 Spinner \u2500\u2500 */\n    .stSpinner > div { color: #7170ff !important; }\n\n    /* \u2500\u2500 Scrollbar \u2500\u2500 */\n    ::-webkit-scrollbar { width: 6px; }\n    ::-webkit-scrollbar-track { background: #08090a; }\n    ::-webkit-scrollbar-thumb { background: #28282c; border-radius: 3px; }\n    ::-webkit-scrollbar-thumb:hover { background: #34343a; }\n</style>\n\"\"\"\n\n\ndef metric_card(label, value, delta=None, delta_positive=True, accent_color=None):\n    \"\"\"Render a Linear-style metric card.\"\"\"\n    from html import escape\n    label = escape(str(label))\n    value = escape(str(value))\n    delta_html = \"\"\n    if delta is not None:\n        cls = \"delta-positive\" if delta_positive else \"delta-negative\"\n        arrow = \"&#8593;\" if delta_positive else \"&#8595;\"\n        delta_html = f'<div class=\"delta {cls}\">{arrow} {escape(str(delta))}</div>'\n    accent = \"\"\n    if accent_color:\n        accent = f' style=\"border-left: 3px solid {accent_color};\"'\n    return f\"\"\"\n    <div class=\"linear-card\"{accent}>\n        <div class=\"label\">{label}</div>\n        <div class=\"value\">{value}</div>\n        {delta_html}\n    </div>\n    \"\"\"\n\n\ndef apply_linear_layout(fig, height=350, **kwargs):\n    \"\"\"Apply Linear dark theme to a Plotly figure.\"\"\"\n    layout = {**PLOTLY_LAYOUT, \"height\": height, **kwargs}\n    fig.update_layout(**layout)\n    return fig\n",
        "dashboards/pages_overview.py": "\"\"\"Executive Overview \u2014 KPI cards, trends, breakdowns (Linear dark theme).\"\"\"\nimport plotly.graph_objects as go\nimport plotly.express as px\nimport streamlit as st\n\nfrom dashboards.config import COLORS, CHART_COLORS, metric_card, apply_linear_layout\n\n\ndef render(impressions, clicks, conversions, campaigns):\n    st.markdown('<div class=\"section-header\">Executive Overview</div>', unsafe_allow_html=True)\n\n    total_imp = len(impressions)\n    total_clk = len(clicks)\n    total_conv = len(conversions)\n    total_spend = impressions[\"bid_price_usd\"].sum()\n    total_rev = conversions[\"revenue_usd\"].sum()\n    ctr = total_clk / total_imp if total_imp else 0\n    cvr = total_conv / total_clk if total_clk else 0\n    roas = total_rev / total_spend if total_spend else 0\n    cpa = total_spend / total_conv if total_conv else 0\n\n    # KPI Row 1\n    c1, c2, c3, c4 = st.columns(4)\n    with c1:\n        st.markdown(metric_card(\"Impressions\", f\"{total_imp:,.0f}\", accent_color=COLORS[\"accent\"]), unsafe_allow_html=True)\n    with c2:\n        st.markdown(metric_card(\"Clicks\", f\"{total_clk:,.0f}\", accent_color=COLORS[\"blue\"]), unsafe_allow_html=True)\n    with c3:\n        st.markdown(metric_card(\"Conversions\", f\"{total_conv:,.0f}\", accent_color=COLORS[\"green\"]), unsafe_allow_html=True)\n    with c4:\n        st.markdown(metric_card(\"Revenue\", f\"${total_rev:,.0f}\", accent_color=COLORS[\"brand\"]), unsafe_allow_html=True)\n\n    # KPI Row 2\n    c5, c6, c7, c8 = st.columns(4)\n    with c5:\n        st.markdown(metric_card(\"CTR\", f\"{ctr:.2%}\"), unsafe_allow_html=True)\n    with c6:\n        st.markdown(metric_card(\"CVR\", f\"{cvr:.2%}\"), unsafe_allow_html=True)\n    with c7:\n        st.markdown(metric_card(\"ROAS\", f\"{roas:.2f}x\"), unsafe_allow_html=True)\n    with c8:\n        st.markdown(metric_card(\"CPA\", f\"${cpa:.2f}\"), unsafe_allow_html=True)\n\n    st.markdown(\"---\")\n\n    # Daily trends\n    col_l, col_r = st.columns(2)\n\n    with col_l:\n        st.subheader(\"Daily Impressions & Clicks\")\n        daily_imp = impressions.groupby(\"date\").size().reset_index(name=\"impressions\")\n        daily_clk = clicks.groupby(\"date\").size().reset_index(name=\"clicks\")\n        daily = daily_imp.merge(daily_clk, on=\"date\", how=\"left\").fillna(0)\n        fig = go.Figure()\n        fig.add_trace(go.Scatter(\n            x=daily[\"date\"], y=daily[\"impressions\"], name=\"Impressions\",\n            fill=\"tozeroy\", line=dict(color=COLORS[\"accent\"], width=1.5),\n            fillcolor=\"rgba(113,112,255,0.08)\",\n        ))\n        fig.add_trace(go.Scatter(\n            x=daily[\"date\"], y=daily[\"clicks\"], name=\"Clicks\",\n            fill=\"tozeroy\", line=dict(color=COLORS[\"green\"], width=1.5),\n            fillcolor=\"rgba(16,185,129,0.08)\", yaxis=\"y2\",\n        ))\n        fig.update_layout(\n            yaxis2=dict(overlaying=\"y\", side=\"right\", gridcolor=\"rgba(255,255,255,0.05)\",\n                        tickfont=dict(color=\"#8a8f98\"), showgrid=False),\n            legend=dict(orientation=\"h\", y=1.12),\n        )\n        apply_linear_layout(fig, height=340)\n        st.plotly_chart(fig, use_container_width=True)\n\n    with col_r:\n        st.subheader(\"Daily Revenue & Conversions\")\n        daily_conv = conversions.groupby(\"date\").agg(\n            conversions=(\"conversion_id\", \"count\"), revenue=(\"revenue_usd\", \"sum\"),\n        ).reset_index()\n        fig2 = go.Figure()\n        fig2.add_trace(go.Bar(\n            x=daily_conv[\"date\"], y=daily_conv[\"revenue\"], name=\"Revenue ($)\",\n            marker_color=\"rgba(94,106,210,0.5)\", marker_line_width=0,\n        ))\n        fig2.add_trace(go.Scatter(\n            x=daily_conv[\"date\"], y=daily_conv[\"conversions\"], name=\"Conversions\",\n            line=dict(color=COLORS[\"green\"], width=2), yaxis=\"y2\",\n        ))\n        fig2.update_layout(\n            yaxis2=dict(overlaying=\"y\", side=\"right\", gridcolor=\"rgba(255,255,255,0.05)\",\n                        tickfont=dict(color=\"#8a8f98\"), showgrid=False),\n            legend=dict(orientation=\"h\", y=1.12),\n        )\n        apply_linear_layout(fig2, height=340)\n        st.plotly_chart(fig2, use_container_width=True)\n\n    # Channel + Device\n    col_a, col_b = st.columns(2)\n\n    with col_a:\n        st.subheader(\"Impressions by Channel\")\n        ch_data = impressions.groupby(\"channel\").size().reset_index(name=\"impressions\").sort_values(\"impressions\", ascending=True)\n        colors = [COLORS[\"channels\"].get(ch, \"#8a8f98\") for ch in ch_data[\"channel\"]]\n        fig3 = go.Figure(go.Bar(\n            y=ch_data[\"channel\"], x=ch_data[\"impressions\"], orientation=\"h\",\n            marker_color=colors, marker_line_width=0,\n        ))\n        apply_linear_layout(fig3, height=320)\n        fig3.update_layout(showlegend=False)\n        st.plotly_chart(fig3, use_container_width=True)\n\n    with col_b:\n        st.subheader(\"Device & Geo Split\")\n        tab1, tab2 = st.tabs([\"Device\", \"Geography\"])\n        with tab1:\n            device_data = impressions[\"device_type\"].value_counts().reset_index()\n            device_data.columns = [\"device\", \"count\"]\n            fig4 = px.pie(device_data, values=\"count\", names=\"device\", hole=0.5,\n                          color_discrete_sequence=CHART_COLORS)\n            apply_linear_layout(fig4, height=300)\n            st.plotly_chart(fig4, use_container_width=True)\n        with tab2:\n            geo_data = impressions[\"geo_country\"].value_counts().reset_index()\n            geo_data.columns = [\"country\", \"count\"]\n            fig5 = go.Figure(go.Bar(\n                x=geo_data[\"country\"], y=geo_data[\"count\"],\n                marker_color=COLORS[\"accent\"], marker_line_width=0, opacity=0.7,\n            ))\n            apply_linear_layout(fig5, height=300)\n            st.plotly_chart(fig5, use_container_width=True)\n",
        "dashboards/pages_attribution.py": "\"\"\"Attribution Analysis \u2014 model comparison, heatmap, divergence (Linear dark theme).\"\"\"\nimport plotly.express as px\nimport plotly.graph_objects as go\nimport streamlit as st\n\nfrom dashboards.config import COLORS, apply_linear_layout\n\n\ndef render(impressions, conversions, attribution_df):\n    st.markdown('<div class=\"section-header\">Attribution Model Comparison</div>', unsafe_allow_html=True)\n\n    if attribution_df.empty:\n        st.warning(\"No attribution data available.\")\n        return\n\n    st.markdown(\"\"\"\n    <div class=\"insight-box\">\n        <strong>Heuristic models</strong> (last-touch, first-touch, linear, time-decay, position-based)\n        use fixed rules. <strong>Data-driven models</strong> (Markov chain, Shapley value) learn from\n        actual user journey data &mdash; they capture cross-channel effects that heuristic models miss entirely.\n    </div>\n    \"\"\", unsafe_allow_html=True)\n\n    model_labels = {\n        \"last_touch\": \"Last Touch\", \"first_touch\": \"First Touch\", \"linear\": \"Linear\",\n        \"time_decay\": \"Time Decay\", \"position_based\": \"Position Based\",\n        \"markov_chain\": \"Markov Chain\", \"shapley_value\": \"Shapley Value\",\n    }\n    model_order = [\"Last Touch\", \"First Touch\", \"Linear\", \"Time Decay\", \"Position Based\", \"Markov Chain\", \"Shapley Value\"]\n    df = attribution_df.copy()\n    df[\"model_label\"] = df[\"model\"].map(model_labels)\n    df[\"credit_pct\"] = df[\"credit\"] * 100\n\n    # Grouped bar chart\n    st.subheader(\"Credit Allocation by Model\")\n    model_colors = [\"#34343a\", \"#3e3e44\", \"#62666d\", \"#8a8f98\", \"#c084fc\", \"#7170ff\", \"#ef4444\"]\n    fig = px.bar(\n        df, x=\"channel\", y=\"credit_pct\", color=\"model_label\",\n        barmode=\"group\", color_discrete_sequence=model_colors,\n        category_orders={\"model_label\": model_order},\n        labels={\"credit_pct\": \"Credit (%)\", \"channel\": \"\", \"model_label\": \"Model\"},\n    )\n    apply_linear_layout(fig, height=420)\n    fig.update_layout(legend=dict(orientation=\"h\", y=-0.18))\n    st.plotly_chart(fig, use_container_width=True)\n\n    # Heatmap\n    st.subheader(\"Attribution Heatmap\")\n    pivot = df.pivot_table(index=\"model_label\", columns=\"channel\", values=\"credit_pct\", aggfunc=\"mean\").fillna(0)\n    ordered = [m for m in model_order if m in pivot.index]\n    pivot = pivot.reindex(ordered)\n    fig2 = px.imshow(\n        pivot.values, x=pivot.columns.tolist(), y=pivot.index.tolist(),\n        color_continuous_scale=[[0, \"#08090a\"], [0.5, \"#5e6ad2\"], [1, \"#828fff\"]],\n        aspect=\"auto\", labels=dict(color=\"Credit (%)\"),\n    )\n    apply_linear_layout(fig2, height=320)\n    st.plotly_chart(fig2, use_container_width=True)\n\n    # Heuristic vs Data-driven\n    st.subheader(\"Heuristic vs. Data-Driven\")\n    heuristic_models = [\"last_touch\", \"first_touch\", \"linear\", \"time_decay\", \"position_based\"]\n    data_driven_models = [\"markov_chain\", \"shapley_value\"]\n\n    col1, col2 = st.columns(2)\n    heuristic = df[df[\"model\"].isin(heuristic_models)]\n    data_driven = df[df[\"model\"].isin(data_driven_models)]\n\n    with col1:\n        st.markdown(\"**Heuristic Models (avg)**\")\n        if not heuristic.empty:\n            avg_h = heuristic.groupby(\"channel\")[\"credit_pct\"].mean().reset_index()\n            fig3 = px.pie(avg_h, values=\"credit_pct\", names=\"channel\", hole=0.5,\n                          color=\"channel\", color_discrete_map=COLORS[\"channels\"])\n            apply_linear_layout(fig3, height=280)\n            st.plotly_chart(fig3, use_container_width=True)\n\n    with col2:\n        st.markdown(\"**Data-Driven Models (avg)**\")\n        if not data_driven.empty:\n            avg_d = data_driven.groupby(\"channel\")[\"credit_pct\"].mean().reset_index()\n            fig4 = px.pie(avg_d, values=\"credit_pct\", names=\"channel\", hole=0.5,\n                          color=\"channel\", color_discrete_map=COLORS[\"channels\"])\n            apply_linear_layout(fig4, height=280)\n            st.plotly_chart(fig4, use_container_width=True)\n\n    # Divergence\n    st.subheader(\"Model Divergence\")\n    if not heuristic.empty and not data_driven.empty:\n        h_avg = heuristic.groupby(\"channel\")[\"credit_pct\"].mean()\n        d_avg = data_driven.groupby(\"channel\")[\"credit_pct\"].mean()\n        diff = (d_avg - h_avg).dropna().reset_index()\n        diff.columns = [\"channel\", \"divergence\"]\n        diff = diff.sort_values(\"divergence\")\n        colors = [COLORS[\"green\"] if v > 0 else COLORS[\"red\"] for v in diff[\"divergence\"]]\n        fig5 = go.Figure(go.Bar(\n            x=diff[\"divergence\"], y=diff[\"channel\"], orientation=\"h\",\n            marker_color=colors, marker_line_width=0,\n            text=[f\"{v:+.1f}%\" for v in diff[\"divergence\"]], textposition=\"outside\",\n            textfont=dict(color=\"#d0d6e0\", size=11),\n        ))\n        apply_linear_layout(fig5, height=280)\n        fig5.update_layout(xaxis_title=\"Data-Driven minus Heuristic (pp)\")\n        st.plotly_chart(fig5, use_container_width=True)\n        st.markdown(\"\"\"\n        <div class=\"insight-box\">\n            <strong style=\"color:#10b981;\">Green</strong> = data-driven gives MORE credit.\n            <strong style=\"color:#ef4444;\">Red</strong> = data-driven gives LESS credit.\n            Large divergences indicate where traditional attribution misleads spend decisions.\n        </div>\n        \"\"\", unsafe_allow_html=True)\n",
        "dashboards/pages_campaigns.py": "\"\"\"Campaign Performance \u2014 ROAS, CPA, efficiency matrix (Linear dark theme).\"\"\"\nimport plotly.express as px\nimport plotly.graph_objects as go\nimport streamlit as st\n\nfrom dashboards.config import COLORS, metric_card, apply_linear_layout\n\n\ndef render(impressions, clicks, conversions, campaigns):\n    st.markdown('<div class=\"section-header\">Campaign Performance</div>', unsafe_allow_html=True)\n\n    imp_agg = impressions.groupby(\"campaign_id\").agg(\n        impressions=(\"impression_id\", \"count\"), spend=(\"bid_price_usd\", \"sum\"),\n        unique_users=(\"user_id\", \"nunique\"),\n    ).reset_index()\n    clk_agg = clicks.groupby(\"campaign_id\").agg(clicks=(\"click_id\", \"count\")).reset_index()\n    conv_agg = conversions.groupby(\"campaign_id\").agg(\n        conversions=(\"conversion_id\", \"count\"), revenue=(\"revenue_usd\", \"sum\"),\n    ).reset_index()\n\n    metrics = imp_agg.merge(clk_agg, on=\"campaign_id\", how=\"left\")\n    metrics = metrics.merge(conv_agg, on=\"campaign_id\", how=\"left\")\n    metrics = metrics.merge(campaigns[[\"campaign_id\", \"campaign_name\", \"channel\", \"status\", \"budget_usd\"]], on=\"campaign_id\", how=\"left\")\n    metrics = metrics.fillna(0)\n\n    metrics[\"ctr\"] = metrics.apply(lambda r: r[\"clicks\"] / r[\"impressions\"] if r[\"impressions\"] > 0 else 0, axis=1)\n    metrics[\"cvr\"] = metrics.apply(lambda r: r[\"conversions\"] / r[\"clicks\"] if r[\"clicks\"] > 0 else 0, axis=1)\n    metrics[\"cpm\"] = metrics.apply(lambda r: (r[\"spend\"] / r[\"impressions\"]) * 1000 if r[\"impressions\"] > 0 else 0, axis=1)\n    metrics[\"roas\"] = metrics.apply(lambda r: r[\"revenue\"] / r[\"spend\"] if r[\"spend\"] > 0 else 0, axis=1)\n    metrics[\"cpa\"] = metrics.apply(lambda r: r[\"spend\"] / r[\"conversions\"] if r[\"conversions\"] > 0 else 0, axis=1)\n\n    # Top performers\n    c1, c2, c3 = st.columns(3)\n    if not metrics.empty and metrics[\"roas\"].max() > 0:\n        top_roas = metrics.loc[metrics[\"roas\"].idxmax()]\n        top_conv = metrics.loc[metrics[\"conversions\"].idxmax()]\n        top_ctr_camp = metrics.loc[metrics[\"ctr\"].idxmax()]\n        with c1:\n            st.markdown(metric_card(\"Best ROAS\", f\"{top_roas['roas']:.2f}x\", delta=top_roas[\"campaign_name\"], accent_color=COLORS[\"green\"]), unsafe_allow_html=True)\n        with c2:\n            st.markdown(metric_card(\"Most Conversions\", f\"{int(top_conv['conversions']):,}\", delta=top_conv[\"campaign_name\"], accent_color=COLORS[\"accent\"]), unsafe_allow_html=True)\n        with c3:\n            st.markdown(metric_card(\"Best CTR\", f\"{top_ctr_camp['ctr']:.2%}\", delta=top_ctr_camp[\"campaign_name\"], accent_color=COLORS[\"blue\"]), unsafe_allow_html=True)\n\n    st.markdown(\"---\")\n\n    col1, col2 = st.columns(2)\n    with col1:\n        st.subheader(\"ROAS vs. Spend\")\n        fig = px.scatter(\n            metrics, x=\"spend\", y=\"roas\", size=\"conversions\",\n            color=\"channel\", color_discrete_map=COLORS[\"channels\"],\n            hover_name=\"campaign_name\",\n            labels={\"spend\": \"Total Spend ($)\", \"roas\": \"ROAS\"},\n        )\n        fig.add_hline(y=1.0, line_dash=\"dash\", line_color=\"#3e3e44\", annotation_text=\"Breakeven\",\n                      annotation_font_color=\"#8a8f98\")\n        apply_linear_layout(fig, height=380)\n        st.plotly_chart(fig, use_container_width=True)\n\n    with col2:\n        st.subheader(\"Channel ROAS\")\n        ch_metrics = metrics.groupby(\"channel\").agg(\n            total_spend=(\"spend\", \"sum\"), total_revenue=(\"revenue\", \"sum\"),\n        ).reset_index()\n        ch_metrics[\"roas\"] = ch_metrics.apply(lambda r: r[\"total_revenue\"] / r[\"total_spend\"] if r[\"total_spend\"] > 0 else 0, axis=1)\n        ch_metrics = ch_metrics.sort_values(\"roas\", ascending=True)\n        colors = [COLORS[\"channels\"].get(ch, \"#8a8f98\") for ch in ch_metrics[\"channel\"]]\n        fig2 = go.Figure(go.Bar(\n            x=ch_metrics[\"roas\"], y=ch_metrics[\"channel\"], orientation=\"h\",\n            marker_color=colors, marker_line_width=0,\n            text=[f\"{v:.2f}x\" for v in ch_metrics[\"roas\"]], textposition=\"outside\",\n            textfont=dict(color=\"#d0d6e0\", size=11),\n        ))\n        fig2.add_vline(x=1.0, line_dash=\"dash\", line_color=\"#3e3e44\")\n        apply_linear_layout(fig2, height=380)\n        st.plotly_chart(fig2, use_container_width=True)\n\n    # Table\n    st.subheader(\"Campaign Details\")\n    display_cols = [\"campaign_name\", \"channel\", \"status\", \"impressions\", \"clicks\", \"conversions\", \"spend\", \"revenue\", \"ctr\", \"cvr\", \"roas\", \"cpa\"]\n    display = metrics[display_cols].copy()\n    display[\"spend\"] = display[\"spend\"].apply(lambda x: f\"${x:,.0f}\")\n    display[\"revenue\"] = display[\"revenue\"].apply(lambda x: f\"${x:,.0f}\")\n    display[\"ctr\"] = display[\"ctr\"].apply(lambda x: f\"{x:.2%}\")\n    display[\"cvr\"] = display[\"cvr\"].apply(lambda x: f\"{x:.2%}\")\n    display[\"roas\"] = display[\"roas\"].apply(lambda x: f\"{x:.2f}x\")\n    display[\"cpa\"] = display[\"cpa\"].apply(lambda x: f\"${x:.2f}\")\n    display.columns = [\"Campaign\", \"Channel\", \"Status\", \"Impr\", \"Clicks\", \"Conv\", \"Spend\", \"Revenue\", \"CTR\", \"CVR\", \"ROAS\", \"CPA\"]\n    st.dataframe(display, use_container_width=True, height=400)\n\n    # Efficiency matrix\n    st.subheader(\"Spend Efficiency Matrix\")\n    fig3 = px.scatter(\n        metrics, x=\"cpa\", y=\"cvr\", size=\"spend\",\n        color=\"channel\", color_discrete_map=COLORS[\"channels\"],\n        hover_name=\"campaign_name\",\n        labels={\"cpa\": \"CPA ($)\", \"cvr\": \"Conversion Rate\"},\n    )\n    apply_linear_layout(fig3, height=380)\n    st.plotly_chart(fig3, use_container_width=True)\n    st.markdown(\"\"\"\n    <div class=\"insight-box\">\n        <strong>Top-left quadrant</strong> = low CPA, high CVR (best performers).\n        <strong>Bottom-right</strong> = high CPA, low CVR (review for optimization).\n    </div>\n    \"\"\", unsafe_allow_html=True)\n",
        "dashboards/pages_channels.py": "\"\"\"Channel & Journey Analysis \u2014 funnel, trends, patterns (Linear dark theme).\"\"\"\nimport plotly.express as px\nimport plotly.graph_objects as go\nimport streamlit as st\n\nfrom dashboards.config import COLORS, metric_card, apply_linear_layout\n\n\ndef render(impressions, clicks, conversions, campaigns):\n    st.markdown('<div class=\"section-header\">Channel & Journey Analysis</div>', unsafe_allow_html=True)\n\n    channels = sorted(impressions[\"channel\"].unique())\n\n    imp_by_ch = impressions.groupby(\"channel\").agg(\n        impressions=(\"impression_id\", \"count\"), spend=(\"bid_price_usd\", \"sum\"),\n    )\n    clk_by_ch = clicks.groupby(\"channel\").size().rename(\"clicks\")\n    conv_by_ch = conversions.groupby(\"channel\").agg(\n        conversions=(\"conversion_id\", \"count\"), revenue=(\"revenue_usd\", \"sum\"),\n    )\n    funnel_df = imp_by_ch.join(clk_by_ch, how=\"left\").join(conv_by_ch, how=\"left\").fillna(0).reset_index()\n    funnel_df[\"ctr\"] = (funnel_df[\"clicks\"] / funnel_df[\"impressions\"]).fillna(0)\n    funnel_df[\"cvr\"] = (funnel_df[\"conversions\"] / funnel_df[\"clicks\"]).fillna(0)\n    funnel_df[\"roas\"] = (funnel_df[\"revenue\"] / funnel_df[\"spend\"]).fillna(0)\n\n    selected_channel = st.selectbox(\"Select Channel\", channels)\n    ch_row = funnel_df[funnel_df[\"channel\"] == selected_channel].iloc[0]\n    color = COLORS[\"channels\"].get(selected_channel, COLORS[\"accent\"])\n\n    c1, c2, c3, c4, c5 = st.columns(5)\n    with c1:\n        st.markdown(metric_card(\"Impressions\", f\"{int(ch_row['impressions']):,}\", accent_color=color), unsafe_allow_html=True)\n    with c2:\n        st.markdown(metric_card(\"Clicks\", f\"{int(ch_row['clicks']):,}\", accent_color=color), unsafe_allow_html=True)\n    with c3:\n        st.markdown(metric_card(\"Conversions\", f\"{int(ch_row['conversions']):,}\", accent_color=color), unsafe_allow_html=True)\n    with c4:\n        st.markdown(metric_card(\"CTR\", f\"{ch_row['ctr']:.2%}\", accent_color=color), unsafe_allow_html=True)\n    with c5:\n        st.markdown(metric_card(\"ROAS\", f\"{ch_row['roas']:.2f}x\", accent_color=color), unsafe_allow_html=True)\n\n    st.markdown(\"---\")\n\n    col1, col2 = st.columns(2)\n    with col1:\n        st.subheader(\"Channel Funnel\")\n        fig = go.Figure(go.Funnel(\n            y=[\"Impressions\", \"Clicks\", \"Conversions\"],\n            x=[ch_row[\"impressions\"], ch_row[\"clicks\"], ch_row[\"conversions\"]],\n            marker=dict(color=[color, color, color]),\n            textinfo=\"value+percent previous\",\n            textfont=dict(color=\"#f7f8f8\"),\n        ))\n        apply_linear_layout(fig, height=340)\n        st.plotly_chart(fig, use_container_width=True)\n\n    with col2:\n        st.subheader(\"All Channels CTR & CVR\")\n        fig2 = go.Figure()\n        for _, row in funnel_df.iterrows():\n            fig2.add_trace(go.Bar(\n                name=row[\"channel\"], x=[\"CTR\", \"CVR\"],\n                y=[row[\"ctr\"] * 100, row[\"cvr\"] * 100],\n                marker_color=COLORS[\"channels\"].get(row[\"channel\"], \"#8a8f98\"),\n                marker_line_width=0,\n            ))\n        fig2.update_layout(barmode=\"group\", yaxis_title=\"Rate (%)\", legend=dict(orientation=\"h\", y=-0.18))\n        apply_linear_layout(fig2, height=340)\n        st.plotly_chart(fig2, use_container_width=True)\n\n    # Daily trends by channel\n    st.subheader(\"Daily Trends by Channel\")\n    metric_choice = st.radio(\"Metric\", [\"Impressions\", \"Spend\", \"Conversions\"], horizontal=True)\n    if metric_choice == \"Impressions\":\n        daily_ch = impressions.groupby([\"date\", \"channel\"]).size().reset_index(name=\"value\")\n    elif metric_choice == \"Spend\":\n        daily_ch = impressions.groupby([\"date\", \"channel\"])[\"bid_price_usd\"].sum().reset_index(name=\"value\")\n    else:\n        daily_ch = conversions.groupby([\"date\", \"channel\"]).size().reset_index(name=\"value\")\n\n    fig3 = px.area(daily_ch, x=\"date\", y=\"value\", color=\"channel\",\n                   color_discrete_map=COLORS[\"channels\"],\n                   labels={\"value\": metric_choice, \"date\": \"\"})\n    apply_linear_layout(fig3, height=380)\n    st.plotly_chart(fig3, use_container_width=True)\n\n    # Hourly pattern\n    st.subheader(\"Hourly Activity Pattern\")\n    imp_hour = impressions.copy()\n    imp_hour[\"hour\"] = imp_hour[\"timestamp\"].dt.hour\n    hourly = imp_hour.groupby([\"hour\", \"channel\"]).size().reset_index(name=\"count\")\n    fig4 = px.line(hourly, x=\"hour\", y=\"count\", color=\"channel\",\n                   color_discrete_map=COLORS[\"channels\"],\n                   labels={\"count\": \"Impressions\", \"hour\": \"Hour of Day\"})\n    apply_linear_layout(fig4, height=320)\n    st.plotly_chart(fig4, use_container_width=True)\n\n    # Conversion types\n    st.subheader(\"Conversion Types by Channel\")\n    conv_types = conversions.groupby([\"channel\", \"conversion_type\"]).size().reset_index(name=\"count\")\n    fig5 = px.bar(conv_types, x=\"channel\", y=\"count\", color=\"conversion_type\",\n                  color_discrete_sequence=[COLORS[\"accent\"], COLORS[\"green\"], COLORS[\"amber\"]],\n                  barmode=\"stack\")\n    apply_linear_layout(fig5, height=340)\n    st.plotly_chart(fig5, use_container_width=True)\n",
        "dashboards/pages_quality.py": "\"\"\"Data Quality & Pipeline Health (Linear dark theme).\"\"\"\nimport pandas as pd\nimport plotly.express as px\nimport plotly.graph_objects as go\nimport streamlit as st\n\nfrom dashboards.config import COLORS, metric_card, apply_linear_layout\n\n\ndef render(impressions, clicks, conversions, campaigns):\n    st.markdown('<div class=\"section-header\">Data Quality & Pipeline Health</div>', unsafe_allow_html=True)\n\n    imp_nulls = impressions.isnull().sum().sum()\n    imp_dups = impressions[\"impression_id\"].duplicated().sum()\n    conv_nulls = conversions.isnull().sum().sum()\n    max_ts = impressions[\"timestamp\"].max()\n    now = pd.Timestamp.now()\n    if hasattr(max_ts, 'tzinfo') and max_ts.tzinfo is not None:\n        max_ts = max_ts.replace(tzinfo=None)\n    freshness_hours = max((now - max_ts).total_seconds() / 3600, 0)\n\n    c1, c2, c3, c4 = st.columns(4)\n    with c1:\n        color = COLORS[\"green\"] if imp_nulls == 0 else COLORS[\"red\"]\n        st.markdown(metric_card(\"Impression Nulls\", f\"{imp_nulls:,}\", accent_color=color), unsafe_allow_html=True)\n    with c2:\n        color = COLORS[\"green\"] if imp_dups == 0 else COLORS[\"amber\"]\n        st.markdown(metric_card(\"Duplicate Impressions\", f\"{imp_dups:,}\", accent_color=color), unsafe_allow_html=True)\n    with c3:\n        color = COLORS[\"green\"] if conv_nulls == 0 else COLORS[\"red\"]\n        st.markdown(metric_card(\"Conversion Nulls\", f\"{conv_nulls:,}\", accent_color=color), unsafe_allow_html=True)\n    with c4:\n        color = COLORS[\"green\"] if freshness_hours < 48 else COLORS[\"amber\"]\n        st.markdown(metric_card(\"Data Freshness\", f\"{freshness_hours:.0f}h ago\", accent_color=color), unsafe_allow_html=True)\n\n    st.markdown(\"---\")\n\n    col1, col2 = st.columns(2)\n\n    with col1:\n        st.subheader(\"Impression Completeness\")\n        imp_complete = (1 - impressions.isnull().mean()).reset_index()\n        imp_complete.columns = [\"column\", \"completeness\"]\n        imp_complete[\"pct\"] = imp_complete[\"completeness\"] * 100\n        colors = [COLORS[\"green\"] if v >= 99 else COLORS[\"amber\"] if v >= 95 else COLORS[\"red\"] for v in imp_complete[\"pct\"]]\n        fig = go.Figure(go.Bar(\n            y=imp_complete[\"column\"], x=imp_complete[\"pct\"], orientation=\"h\",\n            marker_color=colors, marker_line_width=0,\n            text=[f\"{v:.1f}%\" for v in imp_complete[\"pct\"]], textposition=\"inside\",\n            textfont=dict(color=\"#f7f8f8\", size=11),\n        ))\n        fig.add_vline(x=95, line_dash=\"dash\", line_color=\"#3e3e44\")\n        apply_linear_layout(fig, height=320)\n        fig.update_layout(xaxis=dict(range=[80, 101]))\n        st.plotly_chart(fig, use_container_width=True)\n\n    with col2:\n        st.subheader(\"Conversion Completeness\")\n        conv_complete = (1 - conversions.isnull().mean()).reset_index()\n        conv_complete.columns = [\"column\", \"completeness\"]\n        conv_complete[\"pct\"] = conv_complete[\"completeness\"] * 100\n        colors = [COLORS[\"green\"] if v >= 99 else COLORS[\"amber\"] if v >= 95 else COLORS[\"red\"] for v in conv_complete[\"pct\"]]\n        fig2 = go.Figure(go.Bar(\n            y=conv_complete[\"column\"], x=conv_complete[\"pct\"], orientation=\"h\",\n            marker_color=colors, marker_line_width=0,\n            text=[f\"{v:.1f}%\" for v in conv_complete[\"pct\"]], textposition=\"inside\",\n            textfont=dict(color=\"#f7f8f8\", size=11),\n        ))\n        fig2.add_vline(x=95, line_dash=\"dash\", line_color=\"#3e3e44\")\n        apply_linear_layout(fig2, height=320)\n        fig2.update_layout(xaxis=dict(range=[80, 101]))\n        st.plotly_chart(fig2, use_container_width=True)\n\n    # Anomaly detection\n    st.subheader(\"Daily Volume (Anomaly Detection)\")\n    daily_vol = impressions.groupby(\"date\").size().reset_index(name=\"count\")\n    mean_vol = daily_vol[\"count\"].mean()\n    std_vol = daily_vol[\"count\"].std()\n    if pd.notna(std_vol) and std_vol > 0:\n        daily_vol[\"z_score\"] = (daily_vol[\"count\"] - mean_vol) / std_vol\n    else:\n        daily_vol[\"z_score\"] = 0.0\n    daily_vol[\"anomaly\"] = daily_vol[\"z_score\"].abs() > 2\n\n    fig3 = go.Figure()\n    normal = daily_vol[~daily_vol[\"anomaly\"]]\n    anomalies = daily_vol[daily_vol[\"anomaly\"]]\n    fig3.add_trace(go.Scatter(\n        x=normal[\"date\"], y=normal[\"count\"], mode=\"lines+markers\",\n        name=\"Normal\", line=dict(color=COLORS[\"accent\"], width=1.5),\n        marker=dict(size=3, color=COLORS[\"accent\"]),\n    ))\n    if not anomalies.empty:\n        fig3.add_trace(go.Scatter(\n            x=anomalies[\"date\"], y=anomalies[\"count\"], mode=\"markers\",\n            name=\"Anomaly\", marker=dict(color=COLORS[\"red\"], size=10, symbol=\"x\"),\n        ))\n    fig3.add_hline(y=mean_vol, line_dash=\"dash\", line_color=\"#3e3e44\",\n                   annotation_text=\"Mean\", annotation_font_color=\"#8a8f98\")\n    fig3.add_hline(y=mean_vol + 2 * std_vol, line_dash=\"dot\", line_color=COLORS[\"amber\"],\n                   annotation_text=\"+2\\u03c3\", annotation_font_color=\"#8a8f98\")\n    fig3.add_hline(y=mean_vol - 2 * std_vol, line_dash=\"dot\", line_color=COLORS[\"amber\"],\n                   annotation_text=\"-2\\u03c3\", annotation_font_color=\"#8a8f98\")\n    apply_linear_layout(fig3, height=340)\n    st.plotly_chart(fig3, use_container_width=True)\n\n    # Distributions\n    col3, col4 = st.columns(2)\n    with col3:\n        st.subheader(\"Revenue Distribution\")\n        rev_data = conversions[conversions[\"revenue_usd\"] > 0][\"revenue_usd\"]\n        fig4 = px.histogram(rev_data, nbins=50, color_discrete_sequence=[COLORS[\"green\"]])\n        apply_linear_layout(fig4, height=280)\n        fig4.update_layout(xaxis_title=\"Revenue ($)\", yaxis_title=\"Count\")\n        st.plotly_chart(fig4, use_container_width=True)\n    with col4:\n        st.subheader(\"Bid Price Distribution\")\n        fig5 = px.histogram(impressions[\"bid_price_usd\"], nbins=50, color_discrete_sequence=[COLORS[\"accent\"]])\n        apply_linear_layout(fig5, height=280)\n        fig5.update_layout(xaxis_title=\"Bid Price ($)\", yaxis_title=\"Count\")\n        st.plotly_chart(fig5, use_container_width=True)\n\n    # Summary\n    st.subheader(\"Dataset Summary\")\n    summary = pd.DataFrame({\n        \"Dataset\": [\"Impressions\", \"Clicks\", \"Conversions\", \"Campaigns\"],\n        \"Records\": [f\"{len(impressions):,}\", f\"{len(clicks):,}\", f\"{len(conversions):,}\", f\"{len(campaigns):,}\"],\n        \"Date Range\": [\n            f\"{impressions['date'].min()} \\u2192 {impressions['date'].max()}\",\n            f\"{clicks['date'].min()} \\u2192 {clicks['date'].max()}\" if not clicks.empty else \"N/A\",\n            f\"{conversions['date'].min()} \\u2192 {conversions['date'].max()}\" if not conversions.empty else \"N/A\",\n            \"\\u2014\",\n        ],\n        \"Null Rate\": [\n            f\"{impressions.isnull().mean().mean():.2%}\",\n            f\"{clicks.isnull().mean().mean():.2%}\",\n            f\"{conversions.isnull().mean().mean():.2%}\",\n            f\"{campaigns.isnull().mean().mean():.2%}\",\n        ],\n    })\n    st.dataframe(summary, use_container_width=True, hide_index=True)\n",
        "dashboards/data_loader.py": "\"\"\"Data loading for stlite (in-memory, no filesystem).\"\"\"\nimport uuid\nimport numpy as np\nimport pandas as pd\nimport streamlit as st\nfrom datetime import datetime, timedelta\n\nCHANNELS = {\n    \"Paid Search\": {\"ctr\": 0.035, \"conv_rate\": 0.040, \"avg_cpc\": 2.50},\n    \"Social\":      {\"ctr\": 0.012, \"conv_rate\": 0.015, \"avg_cpc\": 1.20},\n    \"Display\":     {\"ctr\": 0.004, \"conv_rate\": 0.008, \"avg_cpc\": 0.80},\n    \"Video\":       {\"ctr\": 0.018, \"conv_rate\": 0.012, \"avg_cpc\": 3.50},\n    \"Email\":       {\"ctr\": 0.025, \"conv_rate\": 0.050, \"avg_cpc\": 0.30},\n    \"Native\":      {\"ctr\": 0.008, \"conv_rate\": 0.010, \"avg_cpc\": 1.50},\n}\nCH_NAMES = list(CHANNELS.keys())\nCH_WEIGHTS = [0.28, 0.24, 0.18, 0.12, 0.10, 0.08]\n\n@st.cache_data(ttl=600)\ndef load_data(data_dir=\"\"):\n    np.random.seed(42)\n    n_days, daily_vol = 60, 500\n    start = datetime.utcnow() - timedelta(days=n_days)\n\n    # Campaigns\n    campaigns = pd.DataFrame([{\n        \"campaign_id\": f\"camp_{i:04d}\",\n        \"campaign_name\": f\"Campaign {i+1}\",\n        \"advertiser_name\": f\"Advertiser {np.random.randint(1,6)}\",\n        \"channel\": np.random.choice(CH_NAMES, p=CH_WEIGHTS),\n        \"budget_usd\": np.random.choice([10000, 25000, 50000, 100000]),\n        \"start_date\": (start + timedelta(days=np.random.randint(0, 30))).date(),\n        \"status\": np.random.choice([\"active\", \"active\", \"paused\", \"completed\"]),\n    } for i in range(15)])\n    camp_ch = campaigns.set_index(\"campaign_id\")[\"channel\"].to_dict()\n    camp_ids = campaigns[\"campaign_id\"].tolist()\n\n    # Impressions\n    n_imp = n_days * daily_vol\n    imp_camps = np.random.choice(camp_ids, n_imp)\n    imp_channels = [camp_ch[c] for c in imp_camps]\n    imp_cpcs = [np.random.lognormal(np.log(CHANNELS[ch][\"avg_cpc\"]), 0.5) for ch in imp_channels]\n    impressions = pd.DataFrame({\n        \"impression_id\": [str(uuid.uuid4()) for _ in range(n_imp)],\n        \"timestamp\": [start + timedelta(days=np.random.randint(0, n_days),\n                      hours=np.random.randint(0, 24), minutes=np.random.randint(0, 60))\n                      for _ in range(n_imp)],\n        \"campaign_id\": imp_camps,\n        \"channel\": imp_channels,\n        \"placement_id\": [f\"pl_{np.random.randint(1,30):03d}\" for _ in range(n_imp)],\n        \"creative_id\": [f\"cr_{np.random.randint(1,50):04d}\" for _ in range(n_imp)],\n        \"user_id\": [f\"user_{np.random.randint(1,50000):06d}\" for _ in range(n_imp)],\n        \"user_segment_id\": [f\"seg_{np.random.randint(1,20):02d}\" for _ in range(n_imp)],\n        \"device_type\": np.random.choice([\"mobile\",\"desktop\",\"ctv\",\"tablet\"], n_imp, p=[.45,.25,.2,.1]),\n        \"geo_country\": np.random.choice([\"US\",\"CA\",\"UK\",\"DE\",\"FR\",\"JP\",\"BR\",\"AU\"], n_imp,\n                                         p=[.40,.10,.12,.08,.08,.07,.08,.07]),\n        \"bid_price_usd\": [round(c, 4) for c in imp_cpcs],\n    })\n\n    # Clicks\n    clicks_list = []\n    for ch, props in CHANNELS.items():\n        ch_imps = impressions[impressions[\"channel\"] == ch]\n        n_clk = int(len(ch_imps) * props[\"ctr\"])\n        if n_clk > 0:\n            sampled = ch_imps.sample(n=min(n_clk, len(ch_imps)), random_state=42)\n            for _, row in sampled.head(200).iterrows():\n                clicks_list.append({\n                    \"click_id\": str(uuid.uuid4()), \"impression_id\": row[\"impression_id\"],\n                    \"timestamp\": row[\"timestamp\"] + timedelta(seconds=np.random.randint(1,30)),\n                    \"campaign_id\": row[\"campaign_id\"], \"channel\": row[\"channel\"],\n                    \"user_id\": row[\"user_id\"], \"device_type\": row[\"device_type\"],\n                    \"geo_country\": row[\"geo_country\"],\n                })\n    clicks = pd.DataFrame(clicks_list) if clicks_list else pd.DataFrame(\n        columns=[\"click_id\",\"impression_id\",\"timestamp\",\"campaign_id\",\"channel\",\"user_id\",\"device_type\",\"geo_country\"])\n\n    # Conversions\n    conv_list = []\n    for ch, props in CHANNELS.items():\n        ch_imps = impressions[impressions[\"channel\"] == ch]\n        n_conv = int(len(ch_imps) * props[\"conv_rate\"])\n        if n_conv > 0:\n            sampled = ch_imps.sample(n=min(n_conv, len(ch_imps)), random_state=42)\n            for _, row in sampled.head(300).iterrows():\n                ct = np.random.choice([\"purchase\",\"store_visit\",\"signup\"], p=[.3,.5,.2])\n                rev = round(np.random.lognormal(3, 1), 2) if ct == \"purchase\" else (\n                    round(np.random.uniform(5, 50), 2) if ct == \"store_visit\" else 0.0)\n                conv_list.append({\n                    \"conversion_id\": str(uuid.uuid4()),\n                    \"timestamp\": row[\"timestamp\"] + timedelta(hours=int(np.random.exponential(48))),\n                    \"user_id\": row[\"user_id\"], \"conversion_type\": ct, \"revenue_usd\": rev,\n                    \"attributed_impression_id\": row[\"impression_id\"],\n                    \"channel\": row[\"channel\"], \"campaign_id\": row[\"campaign_id\"],\n                })\n    conversions = pd.DataFrame(conv_list) if conv_list else pd.DataFrame(\n        columns=[\"conversion_id\",\"timestamp\",\"user_id\",\"conversion_type\",\"revenue_usd\",\n                 \"attributed_impression_id\",\"channel\",\"campaign_id\"])\n\n    impressions[\"timestamp\"] = pd.to_datetime(impressions[\"timestamp\"])\n    clicks[\"timestamp\"] = pd.to_datetime(clicks[\"timestamp\"])\n    conversions[\"timestamp\"] = pd.to_datetime(conversions[\"timestamp\"])\n    impressions[\"date\"] = impressions[\"timestamp\"].dt.date\n    clicks[\"date\"] = clicks[\"timestamp\"].dt.date\n    conversions[\"date\"] = conversions[\"timestamp\"].dt.date\n    return campaigns, impressions, clicks, conversions\n\n@st.cache_data(ttl=600)\ndef compute_attribution_comparison(_impressions, _conversions, cache_key=\"\"):\n    from src.metrics.advanced_attribution import (\n        build_journeys, MarkovAttribution, ShapleyAttribution, PositionBasedAttribution,\n    )\n    from src.metrics.attribution import AttributionEngine\n    imp, conv = _impressions.copy(), _conversions.copy()\n    if len(conv) > 1000: conv = conv.sample(1000, random_state=42)\n    user_ids = set(conv[\"user_id\"].unique())\n    imp = imp[imp[\"user_id\"].isin(user_ids)]\n    results = []\n    for model_name in [\"last_touch\", \"first_touch\", \"linear\", \"time_decay\"]:\n        engine = AttributionEngine(model=model_name)\n        attr_df = engine.attribute(imp, conv)\n        if not attr_df.empty:\n            ch_map = imp.set_index(\"impression_id\")[\"channel\"].to_dict()\n            attr_df[\"channel\"] = attr_df[\"impression_id\"].map(ch_map)\n            ch_credits = attr_df.groupby(\"channel\")[\"credit\"].sum()\n            total = ch_credits.sum()\n            if total > 0: ch_credits = ch_credits / total\n            for ch, credit in ch_credits.items():\n                results.append({\"channel\": ch, \"model\": model_name, \"credit\": credit})\n    journeys, non_conv = build_journeys(imp, conv, \"channel\")\n    if journeys:\n        m = MarkovAttribution(order=1); m.fit(journeys, non_conv)\n        for ch, cr in m.get_attribution().items():\n            results.append({\"channel\": ch, \"model\": \"markov_chain\", \"credit\": cr})\n        s = ShapleyAttribution(); s.fit(journeys, non_conv)\n        for ch, cr in s.get_attribution().items():\n            results.append({\"channel\": ch, \"model\": \"shapley_value\", \"credit\": cr})\n        p = PositionBasedAttribution.fit(journeys, non_conv)\n        for ch, cr in p.items():\n            results.append({\"channel\": ch, \"model\": \"position_based\", \"credit\": cr})\n    return pd.DataFrame(results) if results else pd.DataFrame(columns=[\"channel\",\"model\",\"credit\"])\n",
        "dashboards/app.py": "\"\"\"Ads Attribution Dashboard (stlite version).\"\"\"\nfrom datetime import timedelta\nimport streamlit as st\n\nfrom dashboards.config import CUSTOM_CSS\nfrom dashboards.data_loader import load_data, compute_attribution_comparison\nimport dashboards.pages_overview as overview\nimport dashboards.pages_attribution as attribution\nimport dashboards.pages_campaigns as campaigns_page\nimport dashboards.pages_channels as channels_page\nimport dashboards.pages_quality as quality_page\n\nst.set_page_config(page_title=\"Ads Attribution Pipeline\", page_icon=\"\\U0001f4ca\", layout=\"wide\", initial_sidebar_state=\"expanded\")\nst.markdown(CUSTOM_CSS, unsafe_allow_html=True)\n\nwith st.sidebar:\n    st.markdown(\n        '<p style=\"font-size:18px; font-weight:500; letter-spacing:-0.02em; '\n        'color:#f7f8f8; margin-bottom:4px;\">Attribution Pipeline</p>'\n        '<p style=\"font-size:12px; color:#62666d; margin-top:0;\">Ads Analytics Dashboard</p>',\n        unsafe_allow_html=True,\n    )\n    st.markdown(\"---\")\n    page = st.radio(\"Navigation\", [\n        \"Executive Overview\", \"Attribution Analysis\",\n        \"Campaign Performance\", \"Channel & Journeys\", \"Data Quality\",\n    ], label_visibility=\"collapsed\")\n    st.markdown(\"---\")\n    st.markdown(\n        '<p style=\"color: #62666d; font-size: 11px; line-height: 1.6;\">'\n        \"7 Attribution Models<br>Streamlit + Plotly<br>Linear Design System</p>\",\n        unsafe_allow_html=True,\n    )\n\ncampaigns, impressions, clicks, conversions = load_data()\nif impressions.empty:\n    st.error(\"No data available.\")\n    st.stop()\n\nif page == \"Executive Overview\":\n    overview.render(impressions, clicks, conversions, campaigns)\nelif page == \"Attribution Analysis\":\n    with st.spinner(\"Running 7 attribution models...\"):\n        attr_df = compute_attribution_comparison(impressions, conversions, \"default\")\n    attribution.render(impressions, conversions, attr_df)\nelif page == \"Campaign Performance\":\n    campaigns_page.render(impressions, clicks, conversions, campaigns)\nelif page == \"Channel & Journeys\":\n    channels_page.render(impressions, clicks, conversions, campaigns)\nelif page == \"Data Quality\":\n    quality_page.render(impressions, clicks, conversions, campaigns)\n"
            }
        }, document.getElementById("root")).then(() => {
            document.getElementById("loading").style.display = "none";
        });
    </script>
