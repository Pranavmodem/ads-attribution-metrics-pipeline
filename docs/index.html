            files: {
        "src/__init__.py": "",

        "src/utils/__init__.py": "",
        "src/metrics/attribution.py": "\"\"\"\nattribution.py\nCore attribution logic for mapping conversions back to ad impressions.\n\nSupports multiple attribution models:\n- Last-touch: 100% credit to the last impression before conversion\n- First-touch: 100% credit to the first impression in the user journey\n- Linear: Equal credit distributed across all touchpoints\n- Time-decay: Exponentially more credit to recent touchpoints\n\"\"\"\nimport logging\nfrom dataclasses import dataclass\nfrom typing import List, Literal\nfrom datetime import timedelta\n\nimport pandas as pd\nimport numpy as np\n\nlogger = logging.getLogger(__name__)\n\nAttributionModel = Literal[\"last_touch\", \"first_touch\", \"linear\", \"time_decay\"]\n\n\n@dataclass\nclass AttributionResult:\n    \"\"\"Result of attribution for a single conversion.\"\"\"\n    conversion_id: str\n    model: AttributionModel\n    touchpoints: List[dict]  # Each: {impression_id, credit, timestamp}\n    total_credit: float  # Should sum to 1.0\n\n\nclass AttributionEngine:\n    \"\"\"Computes attribution across multiple models.\n\n    Given a set of impressions and conversions for a user,\n    assigns credit to each impression based on the selected model.\n    \"\"\"\n\n    def __init__(\n        self,\n        model: AttributionModel = \"last_touch\",\n        attribution_window_days: int = 30,\n        decay_half_life_days: float = 7.0,\n    ):\n        self.model = model\n        self.attribution_window = timedelta(days=attribution_window_days)\n        self.decay_half_life = decay_half_life_days\n\n    def attribute(\n        self,\n        impressions: pd.DataFrame,\n        conversions: pd.DataFrame,\n    ) -> pd.DataFrame:\n        \"\"\"Run attribution for all conversions against their impression history.\n\n        Args:\n            impressions: DataFrame with columns [impression_id, user_id, timestamp, campaign_id]\n            conversions: DataFrame with columns [conversion_id, user_id, timestamp, revenue_usd]\n\n        Returns:\n            DataFrame with columns [conversion_id, impression_id, credit, revenue_attributed]\n        \"\"\"\n        logger.info(\n            f\"Running {self.model} attribution: \"\n            f\"{len(conversions):,} conversions \u00d7 {len(impressions):,} impressions\"\n        )\n\n        results = []\n\n        for _, conversion in conversions.iterrows():\n            # Find impressions for this user within the attribution window\n            user_impressions = impressions[\n                (impressions[\"user_id\"] == conversion[\"user_id\"])\n                & (impressions[\"timestamp\"] <= conversion[\"timestamp\"])\n                & (impressions[\"timestamp\"] >= conversion[\"timestamp\"] - self.attribution_window)\n            ].sort_values(\"timestamp\")\n\n            if user_impressions.empty:\n                continue\n\n            credits = self._compute_credits(user_impressions, conversion)\n\n            for _, imp in user_impressions.iterrows():\n                imp_credit = credits.get(imp[\"impression_id\"], 0.0)\n                if imp_credit > 0:\n                    results.append({\n                        \"conversion_id\": conversion[\"conversion_id\"],\n                        \"impression_id\": imp[\"impression_id\"],\n                        \"campaign_id\": imp[\"campaign_id\"],\n                        \"credit\": imp_credit,\n                        \"revenue_attributed\": conversion[\"revenue_usd\"] * imp_credit,\n                        \"model\": self.model,\n                    })\n\n        result_df = pd.DataFrame(results)\n        logger.info(f\"Attribution complete: {len(result_df):,} touchpoint credits assigned\")\n        return result_df\n\n    def _compute_credits(\n        self, impressions: pd.DataFrame, conversion: pd.Series\n    ) -> dict:\n        \"\"\"Compute credit allocation based on the selected model.\"\"\"\n        model_fn = {\n            \"last_touch\": self._last_touch,\n            \"first_touch\": self._first_touch,\n            \"linear\": self._linear,\n            \"time_decay\": self._time_decay,\n        }\n\n        if self.model not in model_fn:\n            raise ValueError(f\"Unknown model: {self.model}\")\n\n        return model_fn[self.model](impressions, conversion)\n\n    def _last_touch(self, impressions: pd.DataFrame, conversion: pd.Series) -> dict:\n        \"\"\"100% credit to the last impression before conversion.\"\"\"\n        last_imp = impressions.iloc[-1]\n        return {last_imp[\"impression_id\"]: 1.0}\n\n    def _first_touch(self, impressions: pd.DataFrame, conversion: pd.Series) -> dict:\n        \"\"\"100% credit to the first impression in the journey.\"\"\"\n        first_imp = impressions.iloc[0]\n        return {first_imp[\"impression_id\"]: 1.0}\n\n    def _linear(self, impressions: pd.DataFrame, conversion: pd.Series) -> dict:\n        \"\"\"Equal credit across all touchpoints.\"\"\"\n        n = len(impressions)\n        credit = 1.0 / n\n        return {row[\"impression_id\"]: credit for _, row in impressions.iterrows()}\n\n    def _time_decay(self, impressions: pd.DataFrame, conversion: pd.Series) -> dict:\n        \"\"\"Exponentially more credit to impressions closer to conversion.\n\n        Uses a half-life decay: impressions N half-lives ago get 1/2^N credit.\n        \"\"\"\n        conversion_time = conversion[\"timestamp\"]\n        half_life_seconds = self.decay_half_life * 86400  # days \u2192 seconds\n\n        raw_weights = {}\n        for _, imp in impressions.iterrows():\n            time_diff = (conversion_time - imp[\"timestamp\"]).total_seconds()\n            weight = np.exp(-0.693 * time_diff / half_life_seconds)  # ln(2) \u2248 0.693\n            raw_weights[imp[\"impression_id\"]] = weight\n\n        # Normalize to sum to 1.0\n        total = sum(raw_weights.values())\n        return {k: v / total for k, v in raw_weights.items()} if total > 0 else raw_weights\n",
        "src/metrics/advanced_attribution.py": "\"\"\"\nadvanced_attribution.py\nData-driven attribution models using Markov chains and Shapley values.\n\nThese go beyond heuristic models (last-touch, linear, etc.) by using\nprobabilistic and game-theoretic methods to fairly allocate conversion\ncredit across marketing channels.\n\nReferences:\n- ChannelAttribution (Markov): https://github.com/DavideAltomare/ChannelAttribution\n- MTA (Shapley): https://github.com/eeghor/mta\n\"\"\"\nimport logging\nfrom itertools import combinations\nfrom math import factorial\nfrom typing import Dict, List, Tuple\n\nimport numpy as np\nimport pandas as pd\n\nlogger = logging.getLogger(__name__)\n\n\ndef build_journeys(\n    impressions: pd.DataFrame,\n    conversions: pd.DataFrame,\n    channel_col: str = \"channel\",\n    attribution_window_days: int = 30,\n) -> Tuple[List[List[str]], int]:\n    \"\"\"Build user journeys from impression and conversion data.\n\n    Returns:\n        Tuple of (converting_journeys, total_non_converting_users).\n        Each journey is a list of channel names in chronological order.\n    \"\"\"\n    impressions = impressions.copy()\n    conversions = conversions.copy()\n    impressions[\"timestamp\"] = pd.to_datetime(impressions[\"timestamp\"])\n    conversions[\"timestamp\"] = pd.to_datetime(conversions[\"timestamp\"])\n\n    converted_users = set(conversions[\"user_id\"].unique())\n    window = pd.Timedelta(days=attribution_window_days)\n\n    converting_journeys = []\n    imp_grouped = impressions.sort_values(\"timestamp\").groupby(\"user_id\")\n    conv_grouped = conversions.groupby(\"user_id\")\n    for user_id in converted_users:\n        if user_id not in imp_grouped.groups:\n            continue\n        user_imps = imp_grouped.get_group(user_id)\n        first_conv_time = conv_grouped.get_group(user_id)[\"timestamp\"].min()\n        relevant_imps = user_imps[\n            (user_imps[\"timestamp\"] <= first_conv_time)\n            & (user_imps[\"timestamp\"] >= first_conv_time - window)\n        ]\n        if relevant_imps.empty:\n            continue\n        journey = relevant_imps[channel_col].tolist()\n        converting_journeys.append(journey)\n\n    all_users = set(impressions[\"user_id\"].unique())\n    non_converting_count = len(all_users - converted_users)\n\n    logger.info(\n        f\"Built {len(converting_journeys)} converting journeys, \"\n        f\"{non_converting_count} non-converting users\"\n    )\n    return converting_journeys, non_converting_count\n\n\nclass MarkovAttribution:\n    \"\"\"Markov chain attribution model.\n\n    Builds a transition probability matrix from user journey data and\n    computes each channel's contribution via the removal effect:\n    how much would total conversions drop if we removed a channel?\n\n    Higher-order Markov chains capture sequence dependencies that\n    heuristic models completely miss.\n    \"\"\"\n\n    def __init__(self, order: int = 1):\n        self.order = order\n        self.transition_matrix: Dict[str, Dict[str, float]] = {}\n        self.channels: List[str] = []\n        self.removal_effects: Dict[str, float] = {}\n\n    def fit(\n        self,\n        converting_journeys: List[List[str]],\n        non_converting_count: int = 0,\n    ) -> \"MarkovAttribution\":\n        \"\"\"Fit the Markov model on journey data.\n\n        Args:\n            converting_journeys: List of journeys (each a list of channels)\n                that ended in conversion.\n            non_converting_count: Number of users who saw ads but didn't convert.\n        \"\"\"\n        self.channels = sorted(\n            set(ch for journey in converting_journeys for ch in journey)\n        )\n\n        # Build transition counts: Start -> channels -> Conversion/Null\n        transitions: Dict[str, Dict[str, int]] = {}\n\n        for journey in converting_journeys:\n            path = [\"(start)\"] + journey + [\"(conversion)\"]\n            for i in range(len(path) - 1):\n                src = path[i]\n                dst = path[i + 1]\n                transitions.setdefault(src, {})\n                transitions[src][dst] = transitions[src].get(dst, 0) + 1\n\n        # Add non-converting paths (start -> null or last channel -> null)\n        if non_converting_count > 0:\n            transitions.setdefault(\"(start)\", {})\n            transitions[\"(start)\"][\"(null)\"] = (\n                transitions[\"(start)\"].get(\"(null)\", 0) + non_converting_count\n            )\n\n        # Normalize to probabilities\n        self.transition_matrix = {}\n        for src, dsts in transitions.items():\n            total = sum(dsts.values())\n            self.transition_matrix[src] = {\n                dst: count / total for dst, count in dsts.items()\n            }\n\n        # Compute removal effects\n        base_conv_rate = self._simulate_conversion_rate(self.transition_matrix)\n        self.removal_effects = {}\n\n        for channel in self.channels:\n            modified_matrix = self._remove_channel(self.transition_matrix, channel)\n            modified_conv_rate = self._simulate_conversion_rate(modified_matrix)\n            effect = (base_conv_rate - modified_conv_rate) / base_conv_rate if base_conv_rate > 0 else 0\n            self.removal_effects[channel] = max(effect, 0)\n\n        # Normalize removal effects to sum to 1\n        total_effect = sum(self.removal_effects.values())\n        if total_effect > 0:\n            self.removal_effects = {\n                ch: eff / total_effect for ch, eff in self.removal_effects.items()\n            }\n\n        logger.info(f\"Markov model fitted: {len(self.channels)} channels, removal effects computed\")\n        return self\n\n    def get_attribution(self) -> Dict[str, float]:\n        \"\"\"Return channel attribution weights (sum to 1.0).\"\"\"\n        return dict(self.removal_effects)\n\n    def _simulate_conversion_rate(self, matrix: Dict[str, Dict[str, float]]) -> float:\n        \"\"\"Compute exact conversion probability using absorbing Markov chain math.\n\n        Solves the system N = (I - Q)^{-1} where Q is the transient-state\n        transition submatrix, then reads off absorption probabilities into\n        the \"(conversion)\" state. This is exact and O(n^3) \u2014 no recursion.\n        \"\"\"\n        if \"(start)\" not in matrix:\n            return 0.0\n\n        absorbing = {\"(conversion)\", \"(null)\"}\n        all_states = set(matrix.keys())\n        for dsts in matrix.values():\n            all_states.update(dsts.keys())\n        transient = sorted(s for s in all_states if s not in absorbing and s in matrix)\n\n        if not transient:\n            return matrix.get(\"(start)\", {}).get(\"(conversion)\", 0.0)\n\n        state_idx = {s: i for i, s in enumerate(transient)}\n        n = len(transient)\n\n        # Build Q (transient-to-transient) and R (transient-to-absorbing)\n        Q = np.zeros((n, n))\n        conv_idx_col = 0  # column index for (conversion) in R\n        R_conv = np.zeros(n)  # only need the (conversion) column of R\n\n        for src in transient:\n            i = state_idx[src]\n            for dst, prob in matrix.get(src, {}).items():\n                if dst in state_idx:\n                    Q[i, state_idx[dst]] = prob\n                elif dst == \"(conversion)\":\n                    R_conv[i] = prob\n\n        # Fundamental matrix N = (I - Q)^{-1}\n        try:\n            IQ = np.eye(n) - Q\n            N = np.linalg.inv(IQ)\n        except np.linalg.LinAlgError:\n            return 0.0\n\n        # Absorption probabilities B = N * R\n        # We only need B[(start), (conversion)]\n        if \"(start)\" not in state_idx:\n            return 0.0\n\n        start_i = state_idx[\"(start)\"]\n        return float(N[start_i] @ R_conv)\n\n    def _remove_channel(\n        self, matrix: Dict[str, Dict[str, float]], channel: str\n    ) -> Dict[str, Dict[str, float]]:\n        \"\"\"Remove a channel: redirect all transitions to/from it to (null).\"\"\"\n        modified = {}\n        for src, dsts in matrix.items():\n            if src == channel:\n                continue\n            new_dsts = {}\n            for dst, prob in dsts.items():\n                if dst == channel:\n                    new_dsts[\"(null)\"] = new_dsts.get(\"(null)\", 0) + prob\n                else:\n                    new_dsts[dst] = prob\n            modified[src] = new_dsts\n        return modified\n\n\nclass ShapleyAttribution:\n    \"\"\"Shapley value attribution model.\n\n    Uses cooperative game theory to fairly distribute conversion credit.\n    For each channel, computes its marginal contribution across all possible\n    coalitions (subsets) of channels.\n\n    This is the mathematically fairest way to allocate credit \u2014 it satisfies\n    efficiency, symmetry, linearity, and null-player axioms.\n    \"\"\"\n\n    def __init__(self):\n        self.channel_credits: Dict[str, float] = {}\n        self.channels: List[str] = []\n        self._coalition_values: Dict[frozenset, float] = {}\n\n    def fit(\n        self,\n        converting_journeys: List[List[str]],\n        non_converting_count: int = 0,\n    ) -> \"ShapleyAttribution\":\n        \"\"\"Compute Shapley values from journey data.\n\n        Args:\n            converting_journeys: List of channel sequences that converted.\n            non_converting_count: Number of non-converting users.\n        \"\"\"\n        self.channels = sorted(\n            set(ch for journey in converting_journeys for ch in journey)\n        )\n\n        if len(self.channels) > 12:\n            raise ValueError(\n                f\"Shapley value is O(2^n) and infeasible with {len(self.channels)} channels. \"\n                f\"Max supported: 12. Use MarkovAttribution instead.\"\n            )\n\n        total_journeys = len(converting_journeys) + non_converting_count\n\n        # Compute coalition values: for each subset of channels,\n        # what fraction of journeys convert when only those channels exist?\n        all_channels = set(self.channels)\n        self._coalition_values = {}\n\n        for size in range(len(self.channels) + 1):\n            for subset in combinations(self.channels, size):\n                subset_set = frozenset(subset)\n                if not subset_set:\n                    self._coalition_values[subset_set] = 0.0\n                    continue\n\n                # Count journeys that only use channels in this subset\n                converting_with_subset = sum(\n                    1\n                    for journey in converting_journeys\n                    if set(journey).issubset(subset_set)\n                )\n                self._coalition_values[subset_set] = (\n                    converting_with_subset / total_journeys if total_journeys > 0 else 0\n                )\n\n        # Compute Shapley values\n        n = len(self.channels)\n        self.channel_credits = {}\n\n        for channel in self.channels:\n            shapley_value = 0.0\n            others = [ch for ch in self.channels if ch != channel]\n\n            for size in range(len(others) + 1):\n                for subset in combinations(others, size):\n                    subset_set = frozenset(subset)\n                    with_channel = subset_set | {channel}\n\n                    marginal = (\n                        self._coalition_values.get(with_channel, 0)\n                        - self._coalition_values.get(subset_set, 0)\n                    )\n\n                    # Shapley weight: |S|! * (n - |S| - 1)! / n!\n                    s = len(subset_set)\n                    weight = (\n                        factorial(s) * factorial(n - s - 1) / factorial(n)\n                    )\n                    shapley_value += weight * marginal\n\n            self.channel_credits[channel] = max(shapley_value, 0)\n\n        # Normalize to sum to 1\n        total = sum(self.channel_credits.values())\n        if total > 0:\n            self.channel_credits = {\n                ch: val / total for ch, val in self.channel_credits.items()\n            }\n\n        logger.info(f\"Shapley values computed for {len(self.channels)} channels\")\n        return self\n\n    def get_attribution(self) -> Dict[str, float]:\n        \"\"\"Return channel attribution weights (sum to 1.0).\"\"\"\n        return dict(self.channel_credits)\n\n\nclass PositionBasedAttribution:\n    \"\"\"Position-based (U-shaped) attribution model.\n\n    40% credit to first touch, 40% to last touch,\n    remaining 20% distributed equally among middle touchpoints.\n    \"\"\"\n\n    @staticmethod\n    def attribute_journey(journey: List[str]) -> Dict[str, float]:\n        \"\"\"Attribute credit for a single journey.\"\"\"\n        if len(journey) == 0:\n            return {}\n        if len(journey) == 1:\n            return {journey[0]: 1.0}\n        if len(journey) == 2:\n            credits = {}\n            credits[journey[0]] = credits.get(journey[0], 0) + 0.5\n            credits[journey[1]] = credits.get(journey[1], 0) + 0.5\n            return credits\n\n        credits: Dict[str, float] = {}\n        credits[journey[0]] = credits.get(journey[0], 0) + 0.4\n        credits[journey[-1]] = credits.get(journey[-1], 0) + 0.4\n        middle_credit = 0.2 / (len(journey) - 2)\n        for ch in journey[1:-1]:\n            credits[ch] = credits.get(ch, 0) + middle_credit\n        return credits\n\n    @staticmethod\n    def fit(\n        converting_journeys: List[List[str]],\n        non_converting_count: int = 0,\n    ) -> Dict[str, float]:\n        \"\"\"Compute position-based attribution across all journeys.\"\"\"\n        total_credits: Dict[str, float] = {}\n        for journey in converting_journeys:\n            journey_credits = PositionBasedAttribution.attribute_journey(journey)\n            for ch, credit in journey_credits.items():\n                total_credits[ch] = total_credits.get(ch, 0) + credit\n\n        total = sum(total_credits.values())\n        if total > 0:\n            total_credits = {ch: v / total for ch, v in total_credits.items()}\n        return total_credits\n\n\ndef factorial(n: int) -> int:\n    \"\"\"Compute factorial with memoization for small values.\"\"\"\n    if n <= 1:\n        return 1\n    result = 1\n    for i in range(2, n + 1):\n        result *= i\n    return result\n",
        "src/metrics/campaign_metrics.py": "\"\"\"\ncampaign_metrics.py\nComputes core advertising business metrics from attributed data.\n\nThese are the metrics that business stakeholders self-serve via dashboards.\n\"\"\"\nimport logging\n\nimport pandas as pd\n\nlogger = logging.getLogger(__name__)\n\n\nclass CampaignMetrics:\n    \"\"\"Calculates standard ad campaign performance metrics.\n\n    Input: joined impression + conversion + attribution data.\n    Output: campaign-level metric aggregations for the marts layer.\n    \"\"\"\n\n    def compute_all(\n        self,\n        impressions: pd.DataFrame,\n        clicks: pd.DataFrame,\n        attributions: pd.DataFrame,\n        campaigns: pd.DataFrame,\n    ) -> pd.DataFrame:\n        \"\"\"Compute all campaign-level metrics.\n\n        Returns a DataFrame with one row per campaign per date, containing:\n        - impressions, clicks, conversions, spend, revenue\n        - CPM, CTR, conversion_rate, ROAS, CPA\n        - fill_rate, avg_frequency, viewability_rate\n        \"\"\"\n        # Aggregate impressions by campaign + date\n        imp_agg = (\n            impressions.assign(date=impressions[\"timestamp\"].dt.date)\n            .groupby([\"campaign_id\", \"date\"])\n            .agg(\n                total_impressions=(\"impression_id\", \"count\"),\n                total_spend=(\"bid_price_usd\", \"sum\"),\n                unique_users=(\"user_id\", \"nunique\"),\n            )\n            .reset_index()\n        )\n\n        # Aggregate clicks\n        click_agg = (\n            clicks.assign(date=clicks[\"timestamp\"].dt.date)\n            .groupby([\"campaign_id\", \"date\"])\n            .agg(total_clicks=(\"click_id\", \"count\"))\n            .reset_index()\n        )\n\n        # Aggregate attributed conversions and revenue\n        conv_agg = (\n            attributions.groupby([\"campaign_id\"])\n            .agg(\n                total_conversions=(\"conversion_id\", \"nunique\"),\n                total_revenue_attributed=(\"revenue_attributed\", \"sum\"),\n            )\n            .reset_index()\n        )\n\n        # Join everything\n        metrics = imp_agg.merge(click_agg, on=[\"campaign_id\", \"date\"], how=\"left\")\n        metrics = metrics.merge(conv_agg, on=[\"campaign_id\"], how=\"left\")\n        metrics = metrics.merge(\n            campaigns[[\"campaign_id\", \"campaign_name\", \"advertiser_name\"]],\n            on=\"campaign_id\",\n            how=\"left\",\n        )\n\n        # Fill NAs\n        metrics[\"total_clicks\"] = metrics[\"total_clicks\"].fillna(0).astype(int)\n        metrics[\"total_conversions\"] = metrics[\"total_conversions\"].fillna(0).astype(int)\n        metrics[\"total_revenue_attributed\"] = metrics[\"total_revenue_attributed\"].fillna(0.0)\n\n        # Compute derived metrics\n        metrics[\"cpm\"] = (metrics[\"total_spend\"] / metrics[\"total_impressions\"]) * 1000\n        metrics[\"ctr\"] = metrics[\"total_clicks\"] / metrics[\"total_impressions\"]\n        metrics[\"conversion_rate\"] = metrics.apply(\n            lambda r: r[\"total_conversions\"] / r[\"total_clicks\"] if r[\"total_clicks\"] > 0 else 0,\n            axis=1,\n        )\n        metrics[\"roas\"] = metrics.apply(\n            lambda r: r[\"total_revenue_attributed\"] / r[\"total_spend\"] if r[\"total_spend\"] > 0 else 0,\n            axis=1,\n        )\n        metrics[\"cpa\"] = metrics.apply(\n            lambda r: r[\"total_spend\"] / r[\"total_conversions\"] if r[\"total_conversions\"] > 0 else None,\n            axis=1,\n        )\n        metrics[\"avg_frequency\"] = metrics[\"total_impressions\"] / metrics[\"unique_users\"]\n\n        logger.info(f\"Computed metrics for {len(metrics):,} campaign-date combinations\")\n        return metrics\n\n    @staticmethod\n    def compute_fill_rate(\n        available_inventory: pd.DataFrame, filled_impressions: pd.DataFrame\n    ) -> pd.DataFrame:\n        \"\"\"Compute fill rate: what % of available ad slots were actually filled.\n\n        Fill rate = filled impressions / available inventory slots.\n        Critical metric for supply-side optimization.\n        \"\"\"\n        inventory_agg = (\n            available_inventory.groupby([\"placement_id\", \"date\"])\n            .agg(available_slots=(\"slot_id\", \"count\"))\n            .reset_index()\n        )\n\n        filled_agg = (\n            filled_impressions.groupby([\"placement_id\", \"date\"])\n            .agg(filled_slots=(\"impression_id\", \"count\"))\n            .reset_index()\n        )\n\n        fill_rate = inventory_agg.merge(filled_agg, on=[\"placement_id\", \"date\"], how=\"left\")\n        fill_rate[\"filled_slots\"] = fill_rate[\"filled_slots\"].fillna(0)\n        fill_rate[\"fill_rate\"] = fill_rate[\"filled_slots\"] / fill_rate[\"available_slots\"]\n\n        return fill_rate\n",
        "src/utils/quality_checks.py": "\"\"\"\nquality_checks.py\nData quality validation utilities for the attribution pipeline.\n\nRuns checks at ingestion time and as standalone quality gates.\n\"\"\"\nimport logging\nfrom typing import List, Optional\n\nimport pandas as pd\n\nlogger = logging.getLogger(__name__)\n\n\ndef validate_schema(df: pd.DataFrame, required_columns: List[str]) -> bool:\n    \"\"\"Check that all required columns are present.\"\"\"\n    missing = set(required_columns) - set(df.columns)\n    if missing:\n        logger.error(f\"Schema validation failed. Missing columns: {missing}\")\n        return False\n    return True\n\n\ndef check_completeness(df: pd.DataFrame, key_column: str, threshold: float = 0.95) -> bool:\n    \"\"\"Check that the key column is non-null above the threshold.\n\n    Args:\n        df: Input dataframe.\n        key_column: Column to check for completeness.\n        threshold: Minimum non-null ratio (default 95%).\n\n    Returns:\n        True if completeness is above threshold.\n    \"\"\"\n    non_null_ratio = df[key_column].notna().mean()\n    passed = non_null_ratio >= threshold\n    status = \"PASS\" if passed else \"FAIL\"\n    logger.info(\n        f\"Completeness check [{status}]: {key_column} = {non_null_ratio:.2%} \"\n        f\"(threshold: {threshold:.2%})\"\n    )\n    return passed\n\n\ndef check_freshness(df: pd.DataFrame, timestamp_col: str, max_delay_hours: int = 24) -> bool:\n    \"\"\"Check that the most recent record is within the expected delay window.\"\"\"\n    max_ts = pd.to_datetime(df[timestamp_col]).max()\n    now = pd.Timestamp.now(tz=\"UTC\")\n    delay_hours = (now - max_ts).total_seconds() / 3600\n\n    passed = delay_hours <= max_delay_hours\n    status = \"PASS\" if passed else \"FAIL\"\n    logger.info(\n        f\"Freshness check [{status}]: latest record is {delay_hours:.1f} hours old \"\n        f\"(max allowed: {max_delay_hours}h)\"\n    )\n    return passed\n\n\ndef check_duplicates(df: pd.DataFrame, key_column: str, max_dup_rate: float = 0.01) -> bool:\n    \"\"\"Check that duplicate rate on key column is below threshold.\"\"\"\n    total = len(df)\n    unique = df[key_column].nunique()\n    dup_rate = 1 - (unique / total) if total > 0 else 0\n\n    passed = dup_rate <= max_dup_rate\n    status = \"PASS\" if passed else \"FAIL\"\n    logger.info(\n        f\"Duplicate check [{status}]: {key_column} dup rate = {dup_rate:.4%} \"\n        f\"(max allowed: {max_dup_rate:.2%})\"\n    )\n    return passed\n\n\ndef check_value_range(\n    df: pd.DataFrame, column: str, min_val: Optional[float] = None, max_val: Optional[float] = None\n) -> bool:\n    \"\"\"Check that numeric values fall within expected range.\"\"\"\n    col_min = df[column].min()\n    col_max = df[column].max()\n\n    issues = []\n    if min_val is not None and col_min < min_val:\n        issues.append(f\"min={col_min} < expected min={min_val}\")\n    if max_val is not None and col_max > max_val:\n        issues.append(f\"max={col_max} > expected max={max_val}\")\n\n    passed = len(issues) == 0\n    status = \"PASS\" if passed else \"FAIL\"\n    logger.info(f\"Range check [{status}]: {column} range=[{col_min}, {col_max}] {', '.join(issues)}\")\n    return passed\n\n\ndef run_all_quality_checks(df: pd.DataFrame, entity: str) -> dict:\n    \"\"\"Run standard quality check suite for a given entity.\"\"\"\n    logger.info(f\"Running quality checks for {entity} ({len(df):,} records)\")\n\n    checks = {}\n    if entity == \"impressions\":\n        checks[\"schema\"] = validate_schema(df, [\"impression_id\", \"timestamp\", \"campaign_id\"])\n        checks[\"completeness\"] = check_completeness(df, \"impression_id\")\n        checks[\"duplicates\"] = check_duplicates(df, \"impression_id\")\n        checks[\"bid_range\"] = check_value_range(df, \"bid_price_usd\", min_val=0, max_val=1000)\n        checks[\"freshness\"] = check_freshness(df, \"timestamp\")\n    elif entity == \"conversions\":\n        checks[\"schema\"] = validate_schema(df, [\"conversion_id\", \"timestamp\", \"user_id\"])\n        checks[\"completeness\"] = check_completeness(df, \"conversion_id\")\n        checks[\"duplicates\"] = check_duplicates(df, \"conversion_id\")\n        checks[\"revenue_range\"] = check_value_range(df, \"revenue_usd\", min_val=-100, max_val=50000)\n\n    all_passed = all(checks.values())\n    logger.info(f\"Quality checks {'ALL PASSED' if all_passed else 'SOME FAILED'}: {checks}\")\n    return checks\n",
